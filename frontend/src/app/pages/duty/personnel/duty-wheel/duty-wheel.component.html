<nb-card class="rotation-dialog">
    <nb-card-header>值班排班转盘 (Duty Rotation Wheel)</nb-card-header>
    <nb-card-body>
        <!-- Platform Tabs -->
        <div class="platform-tabs">
            <button *ngFor="let p of platforms" nbButton [status]="activePlatform === p ? 'primary' : 'basic'"
                (click)="onPlatformChange(p)" size="small">
                {{ p }}
            </button>
        </div>

        <div class="rotation-container mt-3">
            <div class="config-panel">
                <div class="form-group">
                    <label class="label">起始日期</label>
                    <input nbInput fullWidth [nbDatepicker]="startPicker" [(ngModel)]="startDate"
                        (ngModelChange)="onDateChange()">
                    <nb-datepicker #startPicker></nb-datepicker>
                </div>
                <div class="form-group">
                    <label class="label">截止日期</label>
                    <input nbInput fullWidth [nbDatepicker]="endPicker" [(ngModel)]="endDate"
                        (ngModelChange)="onDateChange()">
                    <nb-datepicker #endPicker></nb-datepicker>
                </div>
                <div class="form-group">
                    <label class="label">周期 (天)</label>
                    <input nbInput fullWidth type="number" [(ngModel)]="periodDays" (ngModelChange)="onPeriodChange()">
                </div>
            </div>

            <div class="wheel-area">
                <div class="wheel-clock-container">
                    <!-- SVG Sectors -->
                    <svg viewBox="0 0 380 380" class="wheel-svg" shape-rendering="geometricPrecision">
                        <path *ngFor="let sector of getSectors()" [attr.d]="sector.d" [attr.fill]="sector.color"
                            [attr.stroke]="sector.color" stroke-width="1" opacity="0.7" class="wheel-path" />
                    </svg>

                    <!-- Sectors Text Labels -->
                    <div class="sector-label" *ngFor="let person of availablePersonnel; let i = index">
                        <div class="label-wrapper" [ngStyle]="getLabelStyle(i)">
                            <span class="person-name">{{ person.name }}</span>
                        </div>
                    </div>

                    <!-- Needle -->
                    <div class="needle" [ngClass]="{'dragging': isDragging, 'spinning': isSpinning}"
                        [style.transform]="getNeedleRotation()" *ngIf="availablePersonnel.length > 0"
                        (mousedown)="onMouseDown($event)">
                    </div>

                    <div class="wheel-center">
                        <div class="center-text">DUTY</div>
                    </div>

                    <div class="empty-hint" *ngIf="availablePersonnel.length === 0">暂无人员</div>
                </div>
            </div>

            <div class="personnel-pool">
                <h6>值班人员排序 ({{ activePlatform }})</h6>
                <div class="pool-list" cdkDropList (cdkDropListDropped)="drop($event)">
                    <div class="person-tag" *ngFor="let p of availablePersonnel" cdkDrag [cdkDragData]="p">
                        <nb-icon icon="menu-2-outline" class="drag-handle"></nb-icon>
                        <span class="p-name">{{ p.name }}</span>
                    </div>
                </div>
                <p class="hint-text mt-2">上下拖动调整轮转顺序</p>
            </div>
        </div>
    </nb-card-body>
    <nb-card-footer>
        <button nbButton status="basic" (click)="cancel()">取消</button>
        <button nbButton status="primary" class="ml-3" (click)="save()">保存</button>
    </nb-card-footer>
</nb-card>
