[server]
host = "0.0.0.0"
port = 8080

[database]
url = "mysql://root:password@127.0.0.1:3306/starrocks_admin"

[auth]
jwt_secret = "dev-secret-key-change-in-production"
jwt_expires_in = "24h"

[logging]
level = "info,starrocks_admin_backend=debug"
file = "logs/starrocks-admin.log"

[static_config]
enabled = true
web_root = "web"

[metrics]
interval_secs = 30
retention_days = 7
enabled = true

[audit]
database = "starrocks_audit_db__"
table = "starrocks_audit_tbl__"
